<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" role="img" aria-labelledby="title description">
  <title id="title">TeachKit sample textbook page about persuasive writing</title>
  <desc id="description">An original educational page explaining how to build a claim with reasons and evidence.</desc>
  <rect width="800" height="1050" fill="#fffdf8"/>
  <rect width="18" height="1050" fill="#a65338"/>
  <text x="70" y="90" fill="#a65338" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">ENGLISH · GRADE 5</text>
  <text x="70" y="155" fill="#202a2e" font-family="Georgia, serif" font-size="50" font-weight="700">Build a Persuasive Argument</text>
  <text x="70" y="202" fill="#5e696c" font-family="Arial, sans-serif" font-size="24">Strong arguments connect a clear claim to useful evidence.</text>

  <rect x="70" y="250" width="660" height="350" rx="24" fill="#f8f4eb" stroke="#d8d1c4" stroke-width="2"/>
  <rect x="265" y="290" width="270" height="72" rx="16" fill="#f5e9e3"/>
  <text x="355" y="335" fill="#85412d" font-family="Arial, sans-serif" font-size="24" font-weight="700">CLAIM</text>
  <path d="M400 362 L265 420" stroke="#b9b1a5" stroke-width="4"/><path d="M400 362 L535 420" stroke="#b9b1a5" stroke-width="4"/>
  <rect x="115" y="420" width="260" height="70" rx="16" fill="#e4efea"/>
  <text x="185" y="464" fill="#315b49" font-family="Arial, sans-serif" font-size="22" font-weight="700">REASON 1</text>
  <rect x="425" y="420" width="260" height="70" rx="16" fill="#e7eef3"/>
  <text x="495" y="464" fill="#31546b" font-family="Arial, sans-serif" font-size="22" font-weight="700">REASON 2</text>
  <path d="M245 490 L245 525" stroke="#b9b1a5" stroke-width="4"/><path d="M555 490 L555 525" stroke="#b9b1a5" stroke-width="4"/>
  <rect x="115" y="525" width="260" height="48" rx="12" fill="#fffdf8"/>
  <text x="175" y="556" fill="#344145" font-family="Arial, sans-serif" font-size="19" font-weight="700">EVIDENCE</text>
  <rect x="425" y="525" width="260" height="48" rx="12" fill="#fffdf8"/>
  <text x="485" y="556" fill="#344145" font-family="Arial, sans-serif" font-size="19" font-weight="700">EVIDENCE</text>

  <text x="70" y="670" fill="#202a2e" font-family="Georgia, serif" font-size="34" font-weight="700">Example: A longer lunch break</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="710" width="660" height="72" rx="16" fill="#f5e9e3"/>
    <text x="94" y="742" fill="#85412d" font-size="18" font-weight="700">CLAIM</text>
    <text x="94" y="767" fill="#344145" font-size="18">Our school should extend lunch by ten minutes.</text>
    <rect x="70" y="798" width="320" height="118" rx="16" fill="#e4efea"/>
    <text x="94" y="830" fill="#315b49" font-size="18" font-weight="700">REASON</text>
    <text x="94" y="860" fill="#344145" font-size="17"><tspan x="94" dy="0">Students would have enough</tspan><tspan x="94" dy="25">time to finish eating.</tspan></text>
    <rect x="410" y="798" width="320" height="118" rx="16" fill="#e7eef3"/>
    <text x="434" y="830" fill="#31546b" font-size="18" font-weight="700">EVIDENCE</text>
    <text x="434" y="860" fill="#344145" font-size="17"><tspan x="434" dy="0">In a class survey, 18 of 24</tspan><tspan x="434" dy="25">students said they rush.</tspan></text>
  </g>
  <rect x="70" y="940" width="660" height="52" rx="12" fill="#f8f4eb"/>
  <text x="92" y="973" fill="#344145" font-family="Arial, sans-serif" font-size="18"><tspan font-weight="700">Check:</tspan> Does every reason support the claim? Is the evidence specific?</text>
  <text x="70" y="1018" fill="#7a8385" font-family="Arial, sans-serif" font-size="16">Original TeachKit sample · CC BY 4.0</text>
</svg>
