<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" role="img" aria-labelledby="title description">
  <title id="title">TeachKit sample textbook page about life in ancient Egypt</title>
  <desc id="description">An original educational page explaining how the Nile shaped farming, transport, and settlement.</desc>
  <rect width="800" height="1050" fill="#fffdf8"/>
  <rect width="18" height="1050" fill="#3f6884"/>
  <text x="70" y="90" fill="#3f6884" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">HISTORY · GRADE 6</text>
  <text x="70" y="155" fill="#202a2e" font-family="Georgia, serif" font-size="56" font-weight="700">Life Along the Nile</text>
  <text x="70" y="202" fill="#5e696c" font-family="Arial, sans-serif" font-size="24">A river made permanent settlement possible in a dry land.</text>

  <rect x="70" y="245" width="660" height="360" rx="24" fill="#f5e9d2" stroke="#d8c39d" stroke-width="2"/>
  <circle cx="620" cy="335" r="48" fill="#e9b949"/>
  <path d="M70 515 C190 445 305 495 420 440 C535 385 620 430 730 390 L730 605 L70 605Z" fill="#d9ad68"/>
  <path d="M315 245 C285 340 350 410 305 605 L430 605 C455 495 405 420 445 245Z" fill="#6ba5bf"/>
  <path d="M360 448 L450 448 L405 352 Z" fill="#c89245" stroke="#9b6e31" stroke-width="3"/>
  <rect x="510" y="470" width="105" height="78" fill="#b8783f"/>
  <path d="M495 470 L562 425 L630 470 Z" fill="#8f5f34"/>
  <g fill="#3e725b"><rect x="125" y="492" width="14" height="70"/><path d="M132 492 C85 470 90 430 128 448 C150 410 180 440 145 490Z"/></g>
  <g font-family="Arial, sans-serif" font-size="19" font-weight="700">
    <rect x="245" y="272" width="118" height="40" rx="10" fill="#e7eef3"/><text x="276" y="298" fill="#31546b">NILE</text>
    <rect x="465" y="555" width="188" height="40" rx="10" fill="#fffdf8"/><text x="486" y="581" fill="#85412d">FARMING LAND</text>
  </g>

  <text x="70" y="675" fill="#202a2e" font-family="Georgia, serif" font-size="34" font-weight="700">Why the river mattered</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="715" width="205" height="205" rx="18" fill="#e4efea"/>
    <text x="92" y="755" fill="#315b49" font-size="20" font-weight="700">FARMING</text>
    <text x="92" y="792" fill="#344145" font-size="18"><tspan x="92" dy="0">Seasonal floods left</tspan><tspan x="92" dy="27">fertile soil for crops</tspan><tspan x="92" dy="27">such as wheat and flax.</tspan></text>
    <rect x="297" y="715" width="205" height="205" rx="18" fill="#e7eef3"/>
    <text x="319" y="755" fill="#31546b" font-size="20" font-weight="700">TRANSPORT</text>
    <text x="319" y="792" fill="#344145" font-size="18"><tspan x="319" dy="0">Boats carried people,</tspan><tspan x="319" dy="27">stone, grain, and news</tspan><tspan x="319" dy="27">between settlements.</tspan></text>
    <rect x="524" y="715" width="206" height="205" rx="18" fill="#f5e9e3"/>
    <text x="546" y="755" fill="#85412d" font-size="20" font-weight="700">COMMUNITY</text>
    <text x="546" y="792" fill="#344145" font-size="18"><tspan x="546" dy="0">Reliable water drew</tspan><tspan x="546" dy="27">families together and</tspan><tspan x="546" dy="27">supported growing towns.</tspan></text>
  </g>
  <rect x="70" y="945" width="660" height="45" rx="12" fill="#f8f4eb"/>
  <text x="92" y="974" fill="#344145" font-family="Arial, sans-serif" font-size="18"><tspan font-weight="700">Think:</tspan> How would daily life change if the river failed to flood?</text>
  <text x="70" y="1018" fill="#7a8385" font-family="Arial, sans-serif" font-size="16">Original TeachKit sample · CC BY 4.0</text>
</svg>
