<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" role="img" aria-labelledby="title description">
  <title id="title">TeachKit sample textbook page about fractions</title>
  <desc id="description">An original educational page explaining equivalent fractions with visual models.</desc>
  <rect width="800" height="1050" fill="#fffdf8"/>
  <rect width="18" height="1050" fill="#a65338"/>
  <text x="70" y="90" fill="#a65338" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4">MATH · GRADE 4</text>
  <text x="70" y="155" fill="#202a2e" font-family="Georgia, serif" font-size="52" font-weight="700">Fractions in Everyday Life</text>
  <text x="70" y="202" fill="#5e696c" font-family="Arial, sans-serif" font-size="24">A fraction names equal parts of one whole.</text>

  <rect x="70" y="250" width="660" height="330" rx="24" fill="#f8f4eb" stroke="#d8d1c4" stroke-width="2"/>
  <text x="105" y="302" fill="#202a2e" font-family="Georgia, serif" font-size="31" font-weight="700">Different names, same amount</text>
  <circle cx="250" cy="430" r="92" fill="#fffdf8" stroke="#b9b1a5" stroke-width="4"/>
  <path d="M250 338 A92 92 0 0 1 250 522 L250 430 Z" fill="#e9b949"/>
  <line x1="250" y1="338" x2="250" y2="522" stroke="#b9b1a5" stroke-width="4"/>
  <text x="220" y="555" fill="#85412d" font-family="Arial, sans-serif" font-size="30" font-weight="700">1/2</text>
  <rect x="410" y="350" width="230" height="160" rx="18" fill="#fffdf8" stroke="#b9b1a5" stroke-width="4"/>
  <rect x="410" y="350" width="115" height="80" fill="#e9b949"/>
  <rect x="410" y="430" width="115" height="80" fill="#e9b949"/>
  <line x1="525" y1="350" x2="525" y2="510" stroke="#b9b1a5" stroke-width="4"/>
  <line x1="410" y1="430" x2="640" y2="430" stroke="#b9b1a5" stroke-width="4"/>
  <text x="500" y="555" fill="#85412d" font-family="Arial, sans-serif" font-size="30" font-weight="700">2/4</text>
  <text x="335" y="444" fill="#3e725b" font-family="Arial, sans-serif" font-size="34" font-weight="700">=</text>

  <text x="70" y="650" fill="#202a2e" font-family="Georgia, serif" font-size="34" font-weight="700">Read a fraction</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="690" width="200" height="170" rx="18" fill="#e4efea"/>
    <text x="130" y="770" fill="#315b49" font-size="48" font-weight="700">3</text>
    <line x1="115" y1="790" x2="165" y2="790" stroke="#315b49" stroke-width="4"/>
    <text x="130" y="840" fill="#315b49" font-size="48" font-weight="700">8</text>
    <text x="295" y="748" fill="#344145" font-size="23" font-weight="700">Numerator</text>
    <text x="295" y="778" fill="#5e696c" font-size="20">parts being counted</text>
    <line x1="275" y1="753" x2="176" y2="765" stroke="#a65338" stroke-width="3"/>
    <text x="295" y="824" fill="#344145" font-size="23" font-weight="700">Denominator</text>
    <text x="295" y="854" fill="#5e696c" font-size="20">equal parts in the whole</text>
    <line x1="275" y1="830" x2="176" y2="824" stroke="#a65338" stroke-width="3"/>
  </g>
  <rect x="70" y="900" width="660" height="82" rx="16" fill="#e7eef3"/>
  <text x="96" y="936" fill="#31546b" font-family="Arial, sans-serif" font-size="21" font-weight="700">Try it:</text>
  <text x="175" y="936" fill="#344145" font-family="Arial, sans-serif" font-size="21">Draw two different models that each show 3/4.</text>
  <text x="96" y="966" fill="#5e696c" font-family="Arial, sans-serif" font-size="18">How can you prove the shaded amounts are equivalent?</text>
  <text x="70" y="1018" fill="#7a8385" font-family="Arial, sans-serif" font-size="16">Original TeachKit sample · CC BY 4.0</text>
</svg>
